name: Google Play Release Notification

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: Google Play package name
        required: true
      observed_at:
        description: Detection timestamp
        required: true
      play_store_url:
        description: Public Play Store URL
        required: true
      source_run_url:
        description: Source watcher run URL
        required: false
      changes_markdown:
        description: Detected version changes
        required: true
      release_notes_markdown:
        description: Release notes for changed releases
        required: false

permissions:
  contents: read

jobs:
  notify:
    name: Google Play release detected
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Write release summary
        env:
          PACKAGE_NAME: ${{ inputs.package_name }}
          OBSERVED_AT: ${{ inputs.observed_at }}
          PLAY_STORE_URL: ${{ inputs.play_store_url }}
          SOURCE_RUN_URL: ${{ inputs.source_run_url }}
          CHANGES_MARKDOWN: ${{ inputs.changes_markdown }}
          RELEASE_NOTES_MARKDOWN: ${{ inputs.release_notes_markdown }}
        run: |
          {
            echo "## Google Play Release Detected"
            echo
            echo "Package: \`${PACKAGE_NAME}\`"
            echo "Play Store: [${PACKAGE_NAME}](${PLAY_STORE_URL})"
            echo "Observed at: \`${OBSERVED_AT}\`"
            if [ -n "${SOURCE_RUN_URL}" ]; then
              echo "Source run: [watcher](${SOURCE_RUN_URL})"
            fi
            echo
            echo "### New version codes"
            echo
            printf '%s\n' "${CHANGES_MARKDOWN}"
            echo
            echo "### Release notes"
            echo
            if [ -n "${RELEASE_NOTES_MARKDOWN}" ]; then
              printf '%s\n' "${RELEASE_NOTES_MARKDOWN}"
            else
              echo "- none"
            fi
            echo
          } >> "${GITHUB_STEP_SUMMARY}"
